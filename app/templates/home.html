<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Academy — Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden;}
body{
  background:#060d2e;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;position:relative;
}

.bg-glow{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.g1{width:700px;height:700px;background:rgba(26,35,126,0.7);top:-200px;left:-200px;}
.g2{width:500px;height:500px;background:rgba(255,215,0,0.04);bottom:-100px;right:-100px;animation:pulse 5s ease-in-out infinite;}
.g3{width:400px;height:400px;background:rgba(21,101,192,0.25);top:40%;left:50%;transform:translateX(-50%);}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.15);opacity:1;}}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:20px 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,13,46,0.5);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,215,0,0.06);
}
.logo{
  font-size:18px;font-weight:800;
  background:linear-gradient(135deg,#ffd700,#ffe98a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.theme-wrap{display:flex;align-items:center;gap:10px;}
.theme-toggle{
  width:42px;height:22px;border-radius:11px;
  background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.2);
  cursor:pointer;position:relative;display:flex;align-items:center;padding:2px;
  transition:all 0.3s;
}
.tdot{
  width:16px;height:16px;border-radius:50%;
  background:#ffd700;font-size:9px;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.tdot.moved{transform:translateX(20px);}

.content{
  position:relative;z-index:2;
  text-align:center;padding:24px;
  display:flex;flex-direction:column;align-items:center;
}

.year-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,215,0,0.07);
  border:1px solid rgba(255,215,0,0.15);
  padding:7px 18px;border-radius:100px;
  font-size:11px;font-weight:600;
  color:rgba(255,215,0,0.8);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:36px;
  opacity:0;animation:up 0.8s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
}
.dot{width:5px;height:5px;border-radius:50%;background:#ffd700;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

.school-name{
  font-size:clamp(52px,9vw,110px);
  font-weight:900;
  line-height:1;
  letter-spacing:-3px;
  background:linear-gradient(135deg,#ffffff 0%,rgba(255,255,255,0.85) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
  opacity:0;animation:up 0.9s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
}
.school-sub{
  font-size:clamp(18px,3vw,32px);
  font-weight:700;
  background:linear-gradient(135deg,#ffd700,#ffe98a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
  margin-bottom:28px;
  opacity:0;animation:up 0.9s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;
}
.divider{
  width:60px;height:2px;
  background:linear-gradient(90deg,transparent,#ffd700,transparent);
  margin:0 auto 28px;
  opacity:0;animation:up 0.8s cubic-bezier(0.4,0,0.2,1) 0.8s forwards;
}
.tagline{
  font-size:clamp(14px,2vw,17px);
  color:rgba(255,255,255,0.4);
  font-weight:300;
  letter-spacing:0.2px;
  margin-bottom:52px;
  opacity:0;animation:up 0.8s cubic-bezier(0.4,0,0.2,1) 0.9s forwards;
}

.login-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#ffd700,#f9a825);
  color:#060d2e;padding:16px 44px;border-radius:12px;
  text-decoration:none;font-size:15px;font-weight:800;
  letter-spacing:0.3px;
  transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  opacity:0;animation:up 0.8s cubic-bezier(0.4,0,0.2,1) 1.1s forwards;
  position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity 0.3s;
}
.login-btn:hover{transform:translateY(-3px);box-shadow:0 20px 48px rgba(255,215,0,0.35);}
.login-btn:hover::before{opacity:1;}
.login-btn:active{transform:translateY(-1px);}
.arrow{font-size:18px;transition:transform 0.3s;}
.login-btn:hover .arrow{transform:translateX(4px);}

.footer-text{
  position:fixed;bottom:24px;
  color:rgba(255,255,255,0.18);
  font-size:11px;letter-spacing:0.5px;
  opacity:0;animation:up 0.8s 1.4s forwards;
}

@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

body.light{background:#f4f6fb;}
body.light .school-name{background:linear-gradient(135deg,#0f1f5c,#1a237e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
body.light .tagline{color:rgba(15,31,92,0.4);}
body.light nav{background:rgba(244,246,251,0.7);border-bottom-color:rgba(26,35,126,0.06);}
body.light .logo{background:linear-gradient(135deg,#1a237e,#283593);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
body.light .footer-text{color:rgba(15,31,92,0.2);}

@media(max-width:480px){
  nav{padding:16px 20px;}
  .login-btn{padding:14px 36px;}
}
</style>
</head>
<body>

<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<nav>
  <div class="logo">David Academy</div>
  <div class="theme-wrap">
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="tdot" id="tdot">☀</div>
    </div>
  </div>
</nav>

<div class="content">
  <div class="year-badge">
    <div class="dot"></div>
    Academic Session 2026
  </div>

  <div class="school-name">Welcome to</div>
  <div class="school-sub">David Academy Student Portal</div>
  <div class="divider"></div>
  <div class="tagline">Your gateway to academic excellence</div>

  <a href="/login" class="login-btn">
    Login to Portal
    <span class="arrow">→</span>
  </a>
</div>

<div class="footer-text">&copy; 2026 David Academy &nbsp;·&nbsp; All rights reserved</div>

<script>
function toggleTheme(){
  var b=document.body,d=document.getElementById('tdot');
  if(b.classList.contains('light')){
    b.classList.remove('light');d.textContent='☀';d.classList.remove('moved');
    localStorage.setItem('t','dark');
  } else {
    b.classList.add('light');d.textContent='🌙';d.classList.add('moved');
    localStorage.setItem('t','light');
  }
}
var s=localStorage.getItem('t');
if(s==='light'){document.body.classList.add('light');var d=document.getElementById('tdot');d.textContent='🌙';d.classList.add('moved');}
</script>
</body>
</html>
